  /* varied-size masonry grid: wide photos become 2-col "hero" tiles.

  .pinimg{width:100%;height:100%;object-fit:cover;display:block}
  /* caption overlays the image on hover, so it adds no height */
  .cap{position:absolute;left:0;right:0;bottom:0;margin:0;padding:18px 11px 9px;font-size:11px;line-height:1.35;color:#E8E3D6;background:linear-gradient(rgba(22,20,15,0),rgba(12,11,8,0.92));border-radius:0 0 14px 14px;opacity:0;transition:opacity 0.16s ease;pointer-events:none}

    .featcaptitle{font-size:18px !important}

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  rootRef = React.createRef();
  boardRef = React.createRef();
  featImg = React.createRef();
  featEmpty = React.createRef();
  featNum = React.createRef();
  featCap = React.createRef();

  componentDidMount(){
    const board = this.boardRef.current;
    if(!board) return;
    const figs = Array.from(board.querySelectorAll('figure.pin'));

    const imgOf = (fig) => fig.querySelector('img.pinimg');
    const isLoaded = (img) => img && img.complete && img.naturalWidth > 0;
    const titleOf = (fig) => {
      const spans = fig.querySelectorAll('figcaption span');
      return spans.length > 1 ? spans[1].textContent.trim() : 'untitled';
    };

    // aspect ratio of a pin, read from the frame's inline aspect-ratio
    const aspectOf = (fig) => {
      const f = fig.querySelector('.frame');
      const ar = f && getComputedStyle(f).aspectRatio; // "W / H"
      if(ar && ar.indexOf('/') > -1){
        const [w,h] = ar.split('/').map(Number);
        if(w && h) return w/h;
      }
      const img = imgOf(fig);
      return (img && img.naturalWidth) ? img.naturalWidth/img.naturalHeight : 1;
    };

    // dynamic varied-size masonry: wide photos span 2 columns ("hero"),
    // every tile's row-span is derived from its rendered height.
    const HERO_AR = 1.45;   // photos wider than this become 2-column hero tiles
    const relayout = () => {
      const W = board.clientWidth;
      if(!W) return;
      const cols = W <= 560 ? 2 : (W <= 900 ? 3 : 4);
      const gap = W <= 560 ? 8 : 14;
      const colW = (W - (cols - 1) * gap) / cols;
      const colH = new Array(cols).fill(0);   // running height of each column
      figs.forEach((fig) => {
        const img = imgOf(fig);
        if(img && img.complete && img.naturalWidth === 0){ fig.style.display = 'none'; return; }
        fig.style.display = '';
        const ar = aspectOf(fig) || 1;
        const span = (ar >= HERO_AR && cols >= 2) ? 2 : 1;
        let c = 0;
        if(span === 1){
          for(let i = 1; i < cols; i++) if(colH[i] < colH[c]) c = i;
        } else {
          let best = Infinity;
          for(let i = 0; i < cols - 1; i++){
            const y = Math.max(colH[i], colH[i + 1]);
            if(y < best){ best = y; c = i; }
          }
        }
        const w = span === 1 ? colW : (2 * colW + gap);
        const x = c * (colW + gap);
        const y = span === 1 ? colH[c] : Math.max(colH[c], colH[c + 1]);
        const h = w / ar;
        fig.style.width = w + 'px';
        fig.style.transform = 'translate(' + Math.round(x) + 'px,' + Math.round(y) + 'px)';
        if(span === 1){ colH[c] = y + h + gap; }
        else { colH[c] = colH[c + 1] = y + h + gap; }
      });
      board.style.height = (Math.max.apply(null, colH) - gap) + 'px';
    };
    this._relayout = relayout;
    this._onResize = () => { clearTimeout(this._rt); this._rt = setTimeout(relayout, 120); };
    window.addEventListener('resize', this._onResize);

    this._feature = (fig) => {
      const img = imgOf(fig);
      if(!isLoaded(img)) return;
      const n = figs.indexOf(fig) + 1;
      this.featImg.current.src = img.currentSrc || img.src;
      this.featImg.current.style.display = 'block';
      this.featEmpty.current.style.display = 'none';
      this.featNum.current.textContent = 'pin ' + String(n).padStart(2, '0');
      this.featCap.current.textContent = titleOf(fig);
      figs.forEach((f) => f.classList.toggle('active', f === fig));
      this._active = fig;
    };

    figs.forEach((fig) => {
      const img = imgOf(fig);
      // cards whose photo doesn't exist (yet) simply hide
      if(img){
        if(img.complete && img.naturalWidth === 0){ fig.style.display = 'none'; }
        img.addEventListener('error', () => { fig.style.display = 'none'; relayout(); });
        img.addEventListener('load', () => { relayout(); if(!this._active) this._feature(fig); });
      }
      fig.addEventListener('click', () => {
        this._feature(fig);
        if(window.innerWidth < 760 && this.featImg.current){
          this.featImg.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
    });

    // initial layout (and a few delayed passes while images/fonts settle)
    relayout();
    requestAnimationFrame(relayout);
    [120, 400, 900].forEach((d) => setTimeout(relayout, d));

    // default: feature the first already-loaded pin (retry while images decode)
    let tries = 0;
    const seed = () => {
      if(this._active) return;
      const first = figs.find((f) => isLoaded(imgOf(f)));
      if(first){ this._feature(first); return; }
      if(tries++ < 40) setTimeout(seed, 150);
    };
    seed();
  }

  componentWillUnmount(){ if(this._onResize) window.removeEventListener('resize', this._onResize); }

  renderVals(){
    return {
      rootRef: this.rootRef, boardRef: this.boardRef,
      featImg: this.featImg, featEmpty: this.featEmpty,
      featNum: this.featNum, featCap: this.featCap
    };
  }
}
</script>
