  *{box-sizing:border-box;margin:0;padding:0}

  a{color:#E0703F;text-decoration:none;border-bottom:1px solid rgba(224,112,63,0.42)}

  /* desktop: pinterest-style masonry, each photo its natural shape */
  .board{columns:200px;column-gap:14px}
  .pin{break-inside:avoid;-webkit-column-break-inside:avoid;margin:0 0 14px;display:block}
  .frame{position:relative;border-radius:14px;overflow:hidden;background:#1C1A14;box-shadow:0 1px 2px rgba(0,0,0,0.4);transition:transform 0.16s ease, box-shadow 0.16s ease, outline-color 0.16s ease;outline:2px solid transparent;outline-offset:2px;cursor:pointer}
  .pin:hover .frame{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,0.5)}
  .pin.active .frame{outline-color:#E0703F}
  .pinimg{width:100%;height:100%;object-fit:cover;display:block}
  .cap{margin-top:7px;font-size:11px;padding:0 3px;color:#8A8474;opacity:0;transition:opacity 0.16s ease}
  .pin:hover .cap,.pin.active .cap{opacity:1}
  /* mobile: clean clickable square grid */
  @media(max-width:560px){
    .board{columns:auto;column-gap:0;display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px}
    .pin{break-inside:auto;margin:0}
    .frame{aspect-ratio:1/1 !important}
    .frame::after{content:'\2922';position:absolute;top:7px;right:7px;width:24px;height:24px;border-radius:50%;background:rgba(14,13,10,0.72);color:#E0703F;display:flex;align-items:center;justify-content:center;font-size:12px;pointer-events:none}
    .pin.active .frame::after{content:'\25CF'}
    .cap{opacity:1}
  }
</style>

<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  rootRef = React.createRef();
  boardRef = React.createRef();
  featImg = React.createRef();
  featEmpty = React.createRef();
  featNum = React.createRef();
  featCap = React.createRef();

  componentDidMount(){
    const board = this.boardRef.current;
    if(!board) return;
    const figs = Array.from(board.querySelectorAll('figure.pin'));

    const imgOf = (fig) => fig.querySelector('img.pinimg');
    const isLoaded = (img) => img && img.complete && img.naturalWidth > 0;
    const titleOf = (fig) => {
      const spans = fig.querySelectorAll('figcaption span');
      return spans.length > 1 ? spans[1].textContent.trim() : 'untitled';
    };

    this._feature = (fig) => {
      const img = imgOf(fig);
      if(!isLoaded(img)) return;
      const n = figs.indexOf(fig) + 1;
      this.featImg.current.src = img.currentSrc || img.src;
      this.featImg.current.style.display = 'block';
      this.featEmpty.current.style.display = 'none';
      this.featNum.current.textContent = 'pin ' + String(n).padStart(2, '0');
      this.featCap.current.textContent = titleOf(fig);
      figs.forEach((f) => f.classList.toggle('active', f === fig));
      this._active = fig;
    };

    figs.forEach((fig) => {
      const img = imgOf(fig);
      // cards whose photo doesn't exist (yet) simply hide
      if(img){
        if(img.complete && img.naturalWidth === 0){ fig.style.display = 'none'; }
        img.addEventListener('error', () => { fig.style.display = 'none'; });
        img.addEventListener('load', () => { if(!this._active) this._feature(fig); });
      }
      fig.addEventListener('click', () => {
        this._feature(fig);
        if(window.innerWidth < 760 && this.featImg.current){
          this.featImg.current.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
      });
    });

    // default: feature the first already-loaded pin (retry while images decode)
    let tries = 0;
    const seed = () => {
      if(this._active) return;
      const first = figs.find((f) => isLoaded(imgOf(f)));
      if(first){ this._feature(first); return; }
      if(tries++ < 40) setTimeout(seed, 150);
    };
    seed();
  }

  renderVals(){
    return {
      rootRef: this.rootRef, boardRef: this.boardRef,
      featImg: this.featImg, featEmpty: this.featEmpty,
      featNum: this.featNum, featCap: this.featCap
    };
  }
}
</script>
